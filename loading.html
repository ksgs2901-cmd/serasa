<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conectando...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-subids async defer></script>
  <script>
    window.pixelId = "67f846e3e19eff9c461bb215";
    var a = document.createElement("script");
    a.setAttribute("async", "");
    a.setAttribute("defer", "");
    a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
    document.head.appendChild(a);
  </script>
  <style>
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      visibility: visible;
      opacity: 1;
      transition: opacity 1s ease, visibility 1s ease;
    }

    .progress-bar {
      width: 80%;
      max-width: 400px;
      height: 10px;
      background-color: #D8D8D8;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 20px;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background-color: #d72a80;
      transition: width 2s ease;
    }

    .status-text {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: clamp(20px, 5vw, 28px);
      color: black;
      text-align: center;
      opacity: 0;
      padding: 0 20px;
      transition: transform 0.5s ease, opacity 0.5s ease;
    }
  </style>
</head>
<body>
  <div id="preloader">
    <div class="status-text" id="status-text">Conectando a um atendente...</div>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progress-bar-fill"></div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var params = new URLSearchParams(window.location.search);
      var cpf = params.get("cpf");

      if (!cpf) {
        window.location.replace("/cpf" + window.location.search);
        return;
      }

      var preloader = document.getElementById("preloader");
      var statusText = document.getElementById("status-text");
      var progressBar = document.getElementById("progress-bar-fill");

      function showStatus(text, progress) {
        statusText.style.opacity = 0;
        statusText.style.transform = "translateY(20px)";
        setTimeout(function () {
          statusText.innerText = text;
          statusText.style.opacity = 1;
          statusText.style.transform = "translateY(0)";
          progressBar.style.width = progress + "%";
        }, 300);
      }

      setTimeout(function () {
        statusText.style.opacity = 1;
        statusText.style.transform = "translateY(0)";
        progressBar.style.width = "30%";
      }, 400);

      setTimeout(function () { showStatus("Processando...", 60); }, 2000);
      setTimeout(function () { showStatus("Tudo pronto!", 100); }, 4000);

      setTimeout(function () {
        preloader.style.opacity = 0;
        preloader.style.visibility = "hidden";
        window.location.href = "/atendimento?" + params.toString();
      }, 6000);
    });
  </script>
</body>
</html>
